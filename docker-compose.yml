version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: assistente_rh_db
    restart: always
    environment:
      POSTGRES_DB: assistente_rh
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: MinhaSenh4SuperSegur4123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: assistente_rh_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: assistente_rh_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:MinhaSenh4SuperSegur4123@db:5432/assistente_rh
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: sk-sua_chave_openai_real_aqui
      ENVIRONMENT: production
    volumes:
      - ./backend/uploads:/app/uploads
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: assistente_rh_frontend
    restart: always
    environment:
      REACT_APP_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
